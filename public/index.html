<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Iran Conflict Tracker — Live Military Strikes Map</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0a0a'/%3E%3Ccircle cx='32' cy='32' r='20' fill='none' stroke='%23ef4444' stroke-width='1.5' opacity='0.5'/%3E%3Ccircle cx='32' cy='32' r='12' fill='none' stroke='%23ef4444' stroke-width='1' opacity='0.3'/%3E%3Cline x1='32' y1='8' x2='32' y2='56' stroke='%23ef4444' stroke-width='1' opacity='0.4'/%3E%3Cline x1='8' y1='32' x2='56' y2='32' stroke='%23ef4444' stroke-width='1' opacity='0.4'/%3E%3Ccircle cx='32' cy='32' r='3' fill='%23ef4444'/%3E%3C/svg%3E">
    <script src="config.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
        }

        /* ===== NEWS TICKER (top bar) ===== */
        #news-ticker {
            background: rgba(10,10,10,0.97);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            height: 34px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .ticker-label {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 0 14px;
            height: 100%;
            display: flex;
            align-items: center;
            flex-shrink: 0;
            gap: 7px;
            font-family: 'Inter', sans-serif;
        }
        .ticker-dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: livePulse 2s infinite ease-in-out;
        }
        .ticker-track {
            flex: 1;
            overflow: hidden;
            height: 100%;
            display: flex;
            align-items: center;
            position: relative;
            -webkit-mask-image: linear-gradient(90deg, transparent, #000 24px, #000 calc(100% - 24px), transparent);
            mask-image: linear-gradient(90deg, transparent, #000 24px, #000 calc(100% - 24px), transparent);
        }
        .ticker-scroll {
            display: flex;
            gap: 0;
            white-space: nowrap;
            animation: tickerScroll 45s linear infinite;
            will-change: transform;
        }
        .ticker-scroll:hover { animation-play-state: paused; }
        @keyframes tickerScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .ticker-item {
            font-size: 12px;
            color: #d1d5db;
            text-decoration: none;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 20px;
            height: 34px;
            transition: color 0.15s;
        }
        .ticker-item:hover { color: #fff; }
        .ticker-source {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .ticker-sep {
            color: #1f2937;
            font-size: 5px;
            flex-shrink: 0;
        }

        /* filter-pill kept for any legacy references */
        .filter-pill { display: none; }

        /* ===== DATE SELECTOR (left-side scroll wheel) ===== */
        #date-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 800;
            background: rgba(10,10,10,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            overflow: hidden;
            transition: right 0.3s ease;
        }
        #date-all-btn {
            width: 100%;
            padding: 8px 10px;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.5);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            transition: all 0.2s;
        }
        #date-all-btn:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); }
        #date-all-btn.active {
            background: rgba(239,68,68,0.15);
            color: #ef4444;
        }
        .date-scroll {
            display: flex;
            flex-direction: column;
            gap: 0;
            height: 280px;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            padding: 0;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #000 35%, #000 65%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, #000 35%, #000 65%, transparent 100%);
            scroll-behavior: smooth;
        }
        .date-scroll::-webkit-scrollbar { width: 0; display: none; }
        .date-spacer {
            flex-shrink: 0;
            height: 120px;
            pointer-events: none;
        }
        .date-pill {
            padding: 5px 14px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.85);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            white-space: nowrap;
            text-align: center;
            letter-spacing: 0.4px;
            scroll-snap-align: center;
            flex-shrink: 0;
            height: 26px;
            line-height: 16px;
            transform-origin: center;
            transition: color 0.15s, background 0.15s;
            will-change: transform, opacity;
        }
        .date-pill:hover { color: #fff; }
        .date-pill.active {
            color: #ef4444;
            font-weight: 700;
        }
        /* iOS-style center indicator lines (inside the wheel) */
        #date-sidebar::before,
        #date-sidebar::after {
            content: '';
            position: absolute;
            left: 8px;
            right: 8px;
            height: 1px;
            background: rgba(239,68,68,0.25);
            z-index: 2;
            pointer-events: none;
        }
        #date-sidebar::before { top: calc(50% - 13px + 18px); }
        #date-sidebar::after { top: calc(50% + 13px + 18px); }

        /* ===== LAYOUT ===== */
        #main-wrap {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 34px);
        }
        #main {
            display: flex;
            flex: 1;
            min-height: 0;
            position: relative;
        }
        #map {
            flex: 1;
            min-width: 0;
        }

        /* ===== NEWS PANEL ===== */
        #news-panel {
            width: 340px;
            background: #0f0f0f;
            border-left: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.3s ease;
        }
        #news-panel.collapsed {
            width: 0;
            border-left: none;
        }
        /* When news panel is collapsed, shift the date sidebar rightward */
        #main.news-collapsed #date-sidebar {
            right: 16px;
        }
        #main:not(.news-collapsed) #date-sidebar {
            right: 356px;
        }
        .news-header {
            padding: 10px 14px;
            background: linear-gradient(135deg, #0d0d1a, #111827);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .news-header h3 {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.5px;
        }
        .live-dot {
            width: 7px;
            height: 7px;
            background: #ef4444;
            border-radius: 50%;
            animation: livePulse 2s infinite ease-in-out;
        }
        @keyframes livePulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
            50% { opacity: 0.6; box-shadow: 0 0 0 4px rgba(239,68,68,0); }
        }
        .news-header .updated {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: #4b5563;
        }
        .news-tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .news-tab {
            flex: 1;
            padding: 7px 0;
            text-align: center;
            font-size: 11px;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .news-tab:hover { color: #9ca3af; }
        .news-tab.active {
            color: #fff;
            border-bottom-color: #ef4444;
        }
        .news-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 8px;
        }
        .news-item {
            padding: 10px 12px;
            border-radius: 6px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }
        .news-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.08);
        }
        .news-item.latest {
            border-left-color: #ef4444;
        }
        .news-item .source-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .news-item .source {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .news-item .source-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .news-item .source-dot.newest {
            animation: livePulse 2s infinite ease-in-out;
        }
        .news-item .title {
            font-size: 12px;
            font-weight: 600;
            color: #e5e7eb;
            line-height: 1.45;
            margin-bottom: 3px;
        }
        .news-item .desc {
            font-size: 11px;
            color: #6b7280;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-item .time {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: #4b5563;
            margin-top: 5px;
        }
        .news-loading {
            padding: 20px;
            text-align: center;
            color: #4b5563;
            font-size: 12px;
        }
        #news-toggle {
            position: absolute;
            right: 340px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            background: rgba(10,10,10,0.92);
            border: 1px solid rgba(255,255,255,0.1);
            color: #9ca3af;
            padding: 10px 6px;
            cursor: pointer;
            border-radius: 6px 0 0 6px;
            font-size: 12px;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        #news-toggle .toggle-label {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #9ca3af;
        }
        #news-toggle .toggle-dot {
            width: 6px;
            height: 6px;
            background: #ef4444;
            border-radius: 50%;
            animation: livePulse 2s infinite ease-in-out;
        }
        #news-toggle:hover { color: #fff; }
        #news-toggle:hover .toggle-label { color: #fff; }
        #news-toggle.collapsed { right: 0; }
        .news-list::-webkit-scrollbar { width: 3px; }
        .news-list::-webkit-scrollbar-track { background: transparent; }
        .news-list::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 2px; }

        /* ===== INFO BUTTON ===== */
        .info-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #6b7280;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            position: relative;
        }
        .info-btn:hover { background: rgba(255,255,255,0.1); color: #d1d5db; border-color: rgba(255,255,255,0.25); }
        .info-tooltip {
            display: none;
            position: fixed;
            background: rgba(10,10,10,0.96);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px 16px;
            min-width: 200px;
            white-space: nowrap;
            color: #d1d5db;
            font-size: 11px;
            line-height: 1.7;
            z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .info-tooltip.show { display: block; }
        .info-tooltip::before {
            content: '';
            position: absolute;
            bottom: 100%;
            right: 12px;
            border: 6px solid transparent;
            border-bottom-color: rgba(255,255,255,0.1);
        }
        .info-section-title {
            font-size: 9px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 1px 0;
        }
        .info-dot {
            border-radius: 50%;
            flex-shrink: 0;
            background: #6b7280;
        }
        .info-sources {
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 9px;
            color: #4b5563;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* ===== POPUPS ===== */
        .strike-popup {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-width: 240px;
            max-width: 320px;
        }
        .strike-popup h3 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 4px;
        }
        .strike-popup .attacker-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 100px;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .strike-popup .date {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: #6b7280;
            margin-bottom: 6px;
        }
        .strike-popup .details {
            font-size: 12px;
            line-height: 1.55;
            color: #d1d5db;
        }
        .strike-popup .casualties {
            margin-top: 6px;
            padding: 6px 10px;
            border-left: 3px solid #dc2626;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            background: rgba(239,68,68,0.1);
            color: #fca5a5;
            border-radius: 0 4px 4px 0;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 0.1; }
            100% { opacity: 0.5; }
        }
        .pulse-ring {
            animation: pulse 2.5s infinite ease-in-out;
        }
        @keyframes glowPulse {
            0% { opacity: 0.4; }
            50% { opacity: 0.15; }
            100% { opacity: 0.4; }
        }
        .glow-ring {
            animation: glowPulse 3s infinite ease-in-out;
        }

        /* ===== STRIKE COUNTER ===== */
        #strike-counter {
            position: absolute;
            bottom: 28px;
            left: 10px;
            z-index: 800;
            background: rgba(10,10,10,0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 10px 14px;
            font-family: 'Inter', sans-serif;
            min-width: 160px;
        }
        .counter-title {
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #6b7280;
            margin-bottom: 8px;
        }
        .counter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 3px 0;
        }
        .counter-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 500;
            color: #d1d5db;
        }
        .counter-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .counter-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
        }
        .counter-total {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .counter-total .counter-label {
            font-size: 10px;
            color: #9ca3af;
            font-weight: 600;
        }
        .counter-total .counter-value {
            font-size: 14px;
            color: #ef4444;
        }
        @media (max-width: 768px) {
            #strike-counter {
                bottom: auto;
                left: 6px;
                padding: 8px 10px;
                min-width: 140px;
            }
            .counter-label { font-size: 10px; }
            .counter-value { font-size: 11px; }
            .counter-total .counter-value { font-size: 12px; }
        }

        /* ===== MAPBOX POPUP DARK THEME ===== */
        .mapboxgl-popup-content {
            background: rgba(10, 10, 10, 0.95) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 0 !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            max-width: 340px;
        }
        .mapboxgl-popup-tip { border-top-color: rgba(10, 10, 10, 0.95) !important; }
        .mapboxgl-popup-close-button { color: #9ca3af; font-size: 18px; padding: 4px 8px; }
        .mapboxgl-popup-close-button:hover { color: #fff; background: transparent; }
        .mapboxgl-ctrl-group { background: rgba(10,10,10,0.85) !important; border: 1px solid rgba(255,255,255,0.08) !important; }
        .mapboxgl-ctrl-group button { filter: invert(1); }
        .mapboxgl-ctrl-attrib { opacity: 0.35 !important; font-size: 9px !important; background: rgba(0,0,0,0.4) !important; }
        .mapboxgl-ctrl-attrib a { color: #888 !important; }
        /* ===== COALITION TOGGLE ===== */
        #coalition-toggle {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 800;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #coalition-toggle button {
            padding: 9px 20px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.45);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            transition: all 0.15s;
        }
        #coalition-toggle button:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.04); }
        #coalition-toggle button.active {
            background: rgba(239,68,68,0.2);
            color: #fff;
            box-shadow: inset 0 -2px 0 #ef4444;
        }
        /* Coalition legend */
        #coalition-legend {
            position: absolute;
            bottom: 80px;
            left: 14px;
            z-index: 800;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 12px 14px;
            display: none;
            min-width: 180px;
        }
        #coalition-legend.visible { display: block; }
        .legend-title {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 8px;
            font-family: 'IBM Plex Mono', monospace;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .legend-label {
            font-size: 11px;
            color: #d1d5db;
            font-weight: 500;
        }

        /* ===== LIVE CHAT PANEL ===== */
        #chat-panel {
            position: fixed;
            top: 64px;
            left: 18px;
            width: 320px;
            max-height: 420px;
            z-index: 1100;
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;

<body>

    <!-- Live Anonymous Chat -->

        </div>

    <script>
        // ===== MAPBOX GL INITIALIZATION =====
        mapboxgl.accessToken = window.MAPBOX_TOKEN || '';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11',
            projection: 'globe',
            center: [48, 30],
            zoom: 3.5,
            minZoom: 1.5,
            maxZoom: 15,
            attributionControl: false
        });

        map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-right');
        map.addControl(new mapboxgl.NavigationControl({ showCompass: true }), 'top-right');

        // Color scheme by attacker
        const attackerColors = {
            'US/Israel':   '#3b82f6',  // blue
            'Iran':        '#ef4444',  // red
            'Hezbollah':   '#f97316',  // orange
            'Israel':      '#a855f7',  // purple
            'Maritime':    '#14b8a6',  // teal
        };

        const severityScale = (killed) => {
            if (killed >= 100) return 24;
            if (killed >= 20) return 18;
            if (killed >= 5) return 14;
            if (killed >= 1) return 11;
            return 8;
        };

        let strikes = [];

        // Heuristic to attribute US/Israel joint strikes
        function attributeStrike(s) {
            const d = (s.details + ' ' + s.name).toLowerCase();
            const isUS = /\b(centcom|us navy|submarine|torpedo|us |pentagon|american|navy|uss |camp |port shuaiba|kurdish|cia|pjak)\b/.test(d);
            const isIL = /\b(iaf|f-35|idf|israeli|adir|israel)\b/.test(d);
            if (isUS && !isIL) return ['US'];
            if (isIL && !isUS) return ['IL'];
            return ['US', 'IL'];
        }

        attackerColors['Live'] = '#f59e0b';

        // ===== LAYER TOGGLES =====
        const layerActive = { US: true, IL: true, Iran: true, Hezbollah: true, Israel: true, Maritime: true, Live: true };

        function hexToRgba(hex, a) {
            const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
            return `rgba(${r},${g},${b},${a})`;
        }

        function toggleLayer(key) {
            layerActive[key] = !layerActive[key];
            updateGlobe();
        }

        const liveStrikes = [];

        // ===== FILTERING LOGIC =====
        function isStrikeVisible(s) {
            if (s.attacker === 'US/Israel') {
                const keys = attributeStrike(s);
                if (!keys.some(k => layerActive[k])) return false;
            } else if (s.attacker === 'Live') {
                if (!layerActive['Live']) return false;
            } else if (!layerActive[s.attacker]) return false;

            if (activeTimeFilter !== 'all') {
                const tf = timeFilters.find(t => t.key === activeTimeFilter);
                if (tf && tf.date) {
                    const strikeDate = parseStrikeDate(s.date);
                    let show = s.date.includes(tf.label) || strikeDate.getTime() === tf.date.getTime();
                    if (!show && s.date.includes('–')) {
                        const startDate = parseStrikeDate(s.date.split('–')[0].trim());
                        const endDate = parseStrikeDate(s.date.split('–')[1].trim());
                        show = tf.date >= startDate && tf.date <= endDate;
                    }
                    if (!show) return false;
                }
            }
            return true;
        }

        function getVisibleStrikes() {
            return strikes.filter(isStrikeVisible);
        }

        // ===== GEOJSON CONVERTERS =====
        function flagKeyForStrike(s) {
            if (s.attacker === 'Live') return 'live';
            if (s.attacker === 'Iran') return 'flag-ir';
            if (s.attacker === 'Israel') return 'flag-il'; // Israel → Lebanon strikes
            if (s.attacker === 'Hezbollah') return 'flag-hezbollah';
            if (s.attacker === 'Maritime') return 'flag-maritime';
            if (s.attacker === 'US/Israel') {
                const keys = attributeStrike(s);
                if (keys.length === 1 && keys[0] === 'US') return 'flag-us';
                if (keys.length === 1 && keys[0] === 'IL') return 'flag-il';
                return 'flag-us-il';
            }
            return 'flag-us';
        }

        function strikesToGeoJSON(strikeList) {
            return {
                type: 'FeatureCollection',
                features: strikeList.map((s, i) => ({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [s.lng, s.lat] },
                    properties: {
                        name: s.name, attacker: s.attacker, date: s.date,
                        details: s.details, casualties: s.casualties,
                        killed: s.killed, injured: s.injured,
                        color: attackerColors[s.attacker] || '#f59e0b',
                        radius: severityScale(s.killed),
                        flag: flagKeyForStrike(s),
                        isLive: s.attacker === 'Live' ? 1 : 0
                    }
                }))
            };
        }

        function labelsToGeoJSON(visibleStrikes) {
            const labels = buildLabelsData(visibleStrikes);
            return {
                type: 'FeatureCollection',
                features: labels.map(l => ({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [l.lng, l.lat] },
                    properties: { text: l.text, major: l.major }
                }))
            };
        }

        // Pulse effect handled via circle layers only (no HTML markers)

        // ===== UPDATE MAP (replaces updateGlobe) =====
        function updateMap() {
            const visible = getVisibleStrikes();
            const visibleLive = liveStrikes.filter(() => layerActive['Live']);
            const allVisible = [...visible, ...visibleLive];

            const strikeSource = map.getSource('strikes');
            if (strikeSource) strikeSource.setData(strikesToGeoJSON(allVisible));

            const labelSource = map.getSource('strike-labels-src');
            if (labelSource) labelSource.setData(labelsToGeoJSON(allVisible));

        }
        const updateGlobe = updateMap;

        // ===== DATE SELECTOR (iOS-style scroll wheel) =====
        let activeTimeFilter = 'all';
        const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

        // Build date list from Feb 28, 2026 through today (regenerates on each page load)
        function buildTimeFilters() {
            const start = new Date('2026-02-28T00:00:00');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const filters = [];
            const map = {};
            for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
                const m = MONTH_NAMES[d.getMonth()];
                const day = d.getDate();
                const label = `${m} ${day}`;
                const key = label.toLowerCase().replace(' ', '');
                const dateCopy = new Date(d);
                filters.push({ key, label, date: dateCopy });
                map[label] = dateCopy;
            }
            return { filters, map };
        }

        let { filters: timeFilters, map: dateMap } = buildTimeFilters();

        function parseStrikeDate(dateStr) {
            for (const key of Object.keys(dateMap).sort((a,b) => b.length - a.length)) {
                if (dateStr.includes(key)) return dateMap[key];
            }
            return new Date('2026-02-28');
        }

        // At midnight local time, rebuild the date list so a new day appears automatically
        function scheduleMidnightRefresh() {
            const now = new Date();
            const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 30);
            const msUntilMidnight = nextMidnight - now;
            setTimeout(() => {
                const rebuilt = buildTimeFilters();
                timeFilters = rebuilt.filters;
                dateMap = rebuilt.map;
                rebuildDateSidebar();
                scheduleMidnightRefresh();
            }, msUntilMidnight);
        }
        scheduleMidnightRefresh();

        // (allMarkerLayers removed — globe uses data-driven filtering)

        const dateSidebar = document.getElementById('date-sidebar');
        let allDatePills = [];
        let allBtn, dateScroll, dateScrollRaf = null;

        function rebuildDateSidebar() {
            dateSidebar.innerHTML = '';
            allDatePills = [];

            // "ALL" button on top
            allBtn = document.createElement('button');
            allBtn.id = 'date-all-btn';
            allBtn.className = activeTimeFilter === 'all' ? 'active' : '';
            allBtn.textContent = 'ALL';
            allBtn.addEventListener('click', () => {
                allDatePills.forEach(p => p.el.classList.remove('active'));
                allBtn.classList.add('active');
                activeTimeFilter = 'all';
                applyTimeFilter();
            });
            dateSidebar.appendChild(allBtn);

            // Scrollable date wheel
            dateScroll = document.createElement('div');
            dateScroll.className = 'date-scroll';

            // Spacer top — lets first item center-align
            const topSpacer = document.createElement('div');
            topSpacer.className = 'date-spacer';
            dateScroll.appendChild(topSpacer);

            timeFilters.forEach(tf => {
                const pill = document.createElement('button');
                pill.className = 'date-pill';
                pill.textContent = tf.label;
                pill.dataset.key = tf.key;
                if (tf.key === activeTimeFilter) pill.classList.add('active');
                allDatePills.push({ key: tf.key, el: pill });

                pill.addEventListener('click', () => {
                    selectDatePill(tf.key, true);
                });

                dateScroll.appendChild(pill);
            });

            // Spacer bottom
            const bottomSpacer = document.createElement('div');
            bottomSpacer.className = 'date-spacer';
            dateScroll.appendChild(bottomSpacer);

            // iOS wheel effect: apply depth/opacity based on distance from scroll center
            let scrollStopTimer = null;
            dateScroll.addEventListener('scroll', () => {
                if (!dateScrollRaf) {
                    dateScrollRaf = requestAnimationFrame(() => {
                        dateScrollRaf = null;
                        updateWheelVisuals();
                    });
                }
                // When scrolling stops, auto-select whatever is centered
                if (scrollStopTimer) clearTimeout(scrollStopTimer);
                scrollStopTimer = setTimeout(() => {
                    const scrollRect = dateScroll.getBoundingClientRect();
                    const centerY = scrollRect.top + scrollRect.height / 2;
                    let closest = null;
                    let closestDist = Infinity;
                    allDatePills.forEach(p => {
                        const r = p.el.getBoundingClientRect();
                        const pillCenter = r.top + r.height / 2;
                        const d = Math.abs(pillCenter - centerY);
                        if (d < closestDist) { closestDist = d; closest = p; }
                    });
                    if (closest && closest.key !== activeTimeFilter) {
                        allDatePills.forEach(p => p.el.classList.remove('active'));
                        if (allBtn) allBtn.classList.remove('active');
                        closest.el.classList.add('active');
                        activeTimeFilter = closest.key;
                        applyTimeFilter();
                    }
                }, 140);
            });

            dateSidebar.appendChild(dateScroll);
            // Initial visual pass after layout
            requestAnimationFrame(() => {
                updateWheelVisuals();
                // Scroll the last date (today) into view by default
                if (timeFilters.length > 0) {
                    const lastPill = allDatePills[allDatePills.length - 1].el;
                    lastPill.scrollIntoView({ block: 'center' });
                    updateWheelVisuals();
                }
            });
        }

        function updateWheelVisuals() {
            const scrollRect = dateScroll.getBoundingClientRect();
            const centerY = scrollRect.top + scrollRect.height / 2;
            const maxDist = scrollRect.height / 2;
            allDatePills.forEach(p => {
                const r = p.el.getBoundingClientRect();
                const pillCenter = r.top + r.height / 2;
                const dist = Math.abs(pillCenter - centerY);
                const ratio = Math.min(dist / maxDist, 1);
                // iOS-style: scale 1 at center → 0.72 at edge, opacity 1 → 0.2
                const scale = 1 - ratio * 0.28;
                const opacity = 1 - ratio * 0.8;
                p.el.style.transform = `scale(${scale.toFixed(3)})`;
                p.el.style.opacity = opacity.toFixed(3);
            });
        }

        function selectDatePill(key, smooth) {
            allDatePills.forEach(p => p.el.classList.remove('active'));
            if (allBtn) allBtn.classList.remove('active');
            const found = allDatePills.find(p => p.key === key);
            if (!found) return;
            found.el.classList.add('active');

        // ===== LABELS BUILDER =====
        const alwaysLabel = ['Tel Aviv', 'Beirut', 'Strait', 'Lincoln', 'Minab', 'Isfahan', 'Beit Shemesh', 'Kuwait', 'Doha', 'Nakhchivan', 'Bandar Abbas', 'Natanz', 'Haifa', 'Tabriz', 'Shiraz', 'Dimona', 'Bushehr', 'Mahshahr', 'Tyre', 'Kharg Island', 'Abu Dhabi', 'Bahrain'];

        function buildLabelsData(visibleStrikes) {
            const placedLabels = new Set();
            const cityGroups = {};
            visibleStrikes.forEach(s => {
                const city = s.name.split('—')[0].split('(')[0].trim();
                if (!cityGroups[city] || s.killed > cityGroups[city].killed) {
                    cityGroups[city] = s;
                }
            });

            const labels = [];
            visibleStrikes.forEach(s => {
                const labelName = s.name.split('—')[0].split('(')[0].trim();
                if (placedLabels.has(labelName)) return;

                let showLabel = false;
                if (s.name.includes('Tehran') && s === cityGroups['Tehran']) {
                    showLabel = true;
                } else if (!s.name.includes('Tehran')) {
                    showLabel = alwaysLabel.some(k => s.name.includes(k)) || (s.killed >= 10);
                }

                if (showLabel) {
                    placedLabels.add(labelName);
                    const displayName = s.name.includes('Tehran') ? 'Tehran' : labelName;
                    const isMajor = ['Tehran', 'Tel Aviv', 'Beirut', 'Isfahan', 'Minab'].some(k => s.name.includes(k));
                    labels.push({ lat: s.lat, lng: s.lng, text: displayName, major: isMajor });
                }
            });
            return labels;
        }

        // ===== FLAG ICON LOADER =====
        // Draws a circular flag icon on a canvas and registers it with the map.
        function addRoundFlagImage(id, drawFn, size = 72) {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');
            // circle clip
            ctx.save();
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2 - 2, 0, Math.PI * 2);
            ctx.clip();
            drawFn(ctx, size);
            ctx.restore();
            // white ring
            ctx.strokeStyle = 'rgba(255,255,255,0.95)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2 - 2, 0, Math.PI * 2);
            ctx.stroke();
            if (map.hasImage(id)) map.removeImage(id);
            map.addImage(id, ctx.getImageData(0, 0, size, size));
        }

        function drawImageCover(ctx, img, size) {
            const aspect = img.width / img.height;
            let w, h, x, y;
            if (aspect >= 1) { h = size; w = size * aspect; x = (size - w) / 2; y = 0; }
            else { w = size; h = size / aspect; x = 0; y = (size - h) / 2; }
            ctx.drawImage(img, x, y, w, h);
        }

        function loadImagePromise(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = url;
            });
        }

        async function loadFlagIcons() {
            // Country flags from flagcdn (SVG keeps it crisp).
            const countryFlags = [
                { id: 'flag-us', url: 'https://flagcdn.com/w160/us.png' },
                { id: 'flag-il', url: 'https://flagcdn.com/w160/il.png' },
                { id: 'flag-ir', url: 'https://flagcdn.com/w160/ir.png' }
            ];
            await Promise.all(countryFlags.map(async f => {
                try {
                    const img = await loadImagePromise(f.url);
                    addRoundFlagImage(f.id, (ctx, size) => drawImageCover(ctx, img, size));
                } catch (e) {
                    console.warn('flag load failed', f.id, e);
                }
            }));

            // US + IL combined flag (split diagonally)
            try {
                const [usImg, ilImg] = await Promise.all([
                    loadImagePromise('https://flagcdn.com/w160/us.png'),
                    loadImagePromise('https://flagcdn.com/w160/il.png')
                ]);
                addRoundFlagImage('flag-us-il', (ctx, size) => {
                    ctx.save();
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(size, 0); ctx.lineTo(0, size); ctx.closePath();
                    ctx.clip(); drawImageCover(ctx, usImg, size);
                    ctx.restore();
                    ctx.save();
                    ctx.beginPath(); ctx.moveTo(size, 0); ctx.lineTo(size, size); ctx.lineTo(0, size); ctx.closePath();
                    ctx.clip(); drawImageCover(ctx, ilImg, size);
                    ctx.restore();
                });
            } catch (e) { console.warn('combo flag failed', e); }

            // Hezbollah — yellow background with green bolt
            addRoundFlagImage('flag-hezbollah', (ctx, size) => {
                ctx.fillStyle = '#f7d600'; ctx.fillRect(0, 0, size, size);
                ctx.fillStyle = '#0a7d2a';
                ctx.font = `bold ${size * 0.72}px -apple-system, sans-serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('⚡', size/2, size/2 + size*0.04);
            });

            // Maritime — teal with anchor
            addRoundFlagImage('flag-maritime', (ctx, size) => {
                ctx.fillStyle = '#0d3b40'; ctx.fillRect(0, 0, size, size);
                ctx.fillStyle = '#5eead4';
                ctx.font = `bold ${size * 0.6}px -apple-system, sans-serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('⚓', size/2, size/2 + size*0.04);
            });
        }

            // Click popup on markers (works on curated circles, flag symbols, and live core)

        // ===== INFO BUTTON (appended to filter bar, tooltip on body) =====

        // ===== LIVE NEWS FEED =====
        const RSS_FEEDS = [
            { name: 'BBC', url: 'https://feeds.bbci.co.uk/news/world/middle_east/rss.xml', color: '#ef4444' },
            { name: 'NYT', url: 'https://rss.nytimes.com/services/xml/rss/nyt/MiddleEast.xml', color: '#a855f7' },
            { name: 'AJ', url: 'https://www.aljazeera.com/xml/rss/all.xml', color: '#f59e0b' },
            { name: 'Reuters', url: 'https://www.reutersagency.com/feed/?taxonomy=best-sectors&post_type=best', color: '#14b8a6' }
        ];
        const RSS_APIS = [
            'https://api.rss2json.com/v1/api.json?rss_url=',
            'https://api.allorigins.win/raw?url='
        ];
        let allArticles = [];
        let activeTab = 'all';

        async function fetchFeed(feed) {
            // Try rss2json first
            try {
                const res = await fetch(RSS_APIS[0] + encodeURIComponent(feed.url));
                const data = await res.json();
                if (data.status === 'ok' && data.items && data.items.length > 0) {
                    return data.items.map(item => ({
                        source: feed.name,
                        sourceColor: feed.color,
                        title: item.title,
                        desc: item.description || item.content || '',
                        link: item.link,
                        time: new Date(item.pubDate),
                        thumb: item.thumbnail || (item.enclosure && item.enclosure.link) || ''
                    }));
                }
            } catch (e) { console.warn('rss2json failed for', feed.name, e); }

            // Fallback: allorigins proxy + manual XML parse
            try {
                const res = await fetch(RSS_APIS[1] + encodeURIComponent(feed.url));
                const text = await res.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, 'text/xml');
                const items = xml.querySelectorAll('item');
                return Array.from(items).slice(0, 15).map(item => ({
                    source: feed.name,
                    sourceColor: feed.color,
                    title: item.querySelector('title')?.textContent || '',
                    desc: (item.querySelector('description')?.textContent || '').replace(/<[^>]*>/g, '').substring(0, 200),
                    link: item.querySelector('link')?.textContent || '',
                    time: new Date(item.querySelector('pubDate')?.textContent || Date.now()),
                    thumb: ''
                }));
            } catch (e) { console.warn('Fallback failed for', feed.name, e); }
            return [];
        }

        async function loadAllFeeds() {
            const list = document.getElementById('news-list');
            list.innerHTML = '<div class="news-loading">Fetching live headlines...</div>';
            const results = await Promise.all(RSS_FEEDS.map(f => fetchFeed(f)));
            allArticles = results.flat().sort((a, b) => b.time - a.time);
            if (allArticles.length === 0) {
                list.innerHTML = '<div class="news-loading">Could not load feeds. Retrying...</div>';
                setTimeout(loadAllFeeds, 15000);
                return;
            }
            renderNews();
            document.getElementById('last-updated').textContent =
                new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Cache historical news fetched from Supabase news_archive, keyed by date string
        const historicalNewsCache = {};
        const pendingHistoricalFetches = {};

        function pad2(n) { return String(n).padStart(2, '0'); }

        async function fetchHistoricalNews(date) {
            const y = date.getFullYear();
            const m = pad2(date.getMonth() + 1);
            const d = pad2(date.getDate());
            const cacheKey = `${y}-${m}-${d}`;
            if (cacheKey in historicalNewsCache) return historicalNewsCache[cacheKey];
            if (pendingHistoricalFetches[cacheKey]) return pendingHistoricalFetches[cacheKey];

            // Query Supabase news_archive for articles from this day
            const startIso = new Date(`${y}-${m}-${d}T00:00:00Z`).toISOString();
            const endIso = new Date(`${y}-${m}-${d}T23:59:59Z`).toISOString();

            pendingHistoricalFetches[cacheKey] = sb
                .from('news_archive')
                .select('source, source_color, title, description, link, pub_date, thumb')
                .gte('pub_date', startIso)
                .lte('pub_date', endIso)
                .order('pub_date', { ascending: false })
                .limit(100)
                .then(({ data, error }) => {
                    if (error) {
                        console.warn('Archive fetch error:', error.message);
                        historicalNewsCache[cacheKey] = [];
                        delete pendingHistoricalFetches[cacheKey];
                        return [];
                    }
                    const arts = (data || []).map(a => ({
                        source: a.source,
                        sourceColor: a.source_color || '#8b5cf6',
                        title: a.title,
                        desc: a.description || '',
                        link: a.link,
                        time: new Date(a.pub_date),
                        thumb: a.thumb || '',
                        _historical: true
                    }));
                    historicalNewsCache[cacheKey] = arts;
                    delete pendingHistoricalFetches[cacheKey];
                    return arts;
                });
            return pendingHistoricalFetches[cacheKey];
        }

        function renderNews() {
            const list = document.getElementById('news-list');
            let filtered = activeTab === 'all'
                ? allArticles
                : allArticles.filter(a => a.source.toLowerCase() === activeTab);

            // Also filter by the selected date from the scroll wheel
            let dateFilterActive = false;
            let selectedDate = null;
            if (activeTimeFilter !== 'all') {
                const tf = timeFilters.find(t => t.key === activeTimeFilter);
                if (tf && tf.date) {
                    dateFilterActive = true;
                    selectedDate = tf.date;
                    const startOfDay = new Date(tf.date);
                    startOfDay.setHours(0, 0, 0, 0);
                    const endOfDay = new Date(startOfDay);
                    endOfDay.setDate(endOfDay.getDate() + 1);
                    filtered = filtered.filter(a => {
                        const t = a.time.getTime();
                        return t >= startOfDay.getTime() && t < endOfDay.getTime();
                    });
                }
            }

            // Add cached historical articles if date filter is active
            if (dateFilterActive && selectedDate) {
                const y = selectedDate.getFullYear();
                const m = pad2(selectedDate.getMonth() + 1);
                const d = pad2(selectedDate.getDate());
                const cacheKey = `${y}-${m}-${d}`;
                const hist = historicalNewsCache[cacheKey];
                if (hist && hist.length) {
                    // Merge, dedupe by link
                    const seen = new Set(filtered.map(a => a.link));
                    hist.forEach(a => { if (!seen.has(a.link)) filtered.push(a); });
                    filtered.sort((a, b) => b.time - a.time);
                }
            }

            if (filtered.length === 0) {
                const dateLabel = activeTimeFilter === 'all' ? '' : ' for ' + (timeFilters.find(t => t.key === activeTimeFilter)?.label || '');
                // If this is a past date and we haven't tried fetching yet, fetch from GDELT
                if (dateFilterActive && selectedDate) {
                    const today = new Date(); today.setHours(0,0,0,0);
                    if (selectedDate.getTime() < today.getTime()) {
                        const yy = selectedDate.getFullYear();
                        const mm = pad2(selectedDate.getMonth() + 1);
                        const dd = pad2(selectedDate.getDate());
                        const key = `${yy}-${mm}-${dd}`;
                        // If already attempted (success or empty), don't re-fetch — prevents infinite loop
                        if (key in historicalNewsCache) {
                            list.innerHTML = `<div class="news-loading">No articles found${dateLabel}</div>`;
                            return;
                        }
                        list.innerHTML = `<div class="news-loading">Searching archive${dateLabel}...</div>`;
                        const filterSnapshot = activeTimeFilter;
                        fetchHistoricalNews(selectedDate).then(() => {
                            // Only rerender if the user is still looking at this same date
                            if (activeTimeFilter === filterSnapshot) renderNews();
                        });
                        return;
                    }
                }
                list.innerHTML = `<div class="news-loading">No articles found${dateLabel}</div>`;
                return;
            }

            list.innerHTML = filtered.map((a, i) => {
                const timeStr = a.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = a.time.toLocaleDateString([], { month: 'short', day: 'numeric' });
                const cleanDesc = a.desc.replace(/<[^>]*>/g, '').substring(0, 120);

                return `
                    <a href="${a.link}" target="_blank" rel="noopener" style="text-decoration:none;display:block;">
                        <div class="news-item${isLatest ? ' latest' : ''}">
                            <div class="source-row">

                            <div class="time">${timeStr} · ${dateStr}</div>
                        </div>
                    </a>`;
            }).join('');
        }

        const STRIKE_KEYWORDS = /\b(strike|struck|bomb|attack|missile|rocket|drone|shell|torpedo|intercept|shoot down|shot down|blast|explo|kill|dead|wound|injur|casualt|destroy|hit|target|raid|assault|barrage|salvo|launch|fire[ds]?\b)/i;

        function extractCasualties(text) {
            let killed = 0, injured = 0;
            const killMatch = text.match(/(\d+)\s*(?:people\s+)?(?:killed|dead|die[ds]?|death|slain|perish)/i);
            const injMatch = text.match(/(\d+)\s*(?:people\s+)?(?:injured|wounded|hurt)/i);
            if (killMatch) killed = parseInt(killMatch[1]);
            if (injMatch) injured = parseInt(injMatch[1]);
            return { killed, injured };
        }

        function detectAttacker(text) {
            const t = text.toLowerCase();
            if (/\b(us|u\.s\.|american|pentagon|centcom)\b/.test(t) && /\b(israel|idf|iaf)\b/.test(t)) return 'US/Israel';
            if (/\b(hezbollah|hezb)\b/.test(t)) return 'Hezbollah';
            if (/\b(houthi|ansar\s*allah)\b/.test(t)) return 'Iran';
            if (/\b(irgc|iran|tehran|true\s*promise)\b/.test(t) && /\b(strike|attack|launch|fire|missile|retali)/i.test(t)) return 'Iran';
            if (/\b(israel|idf)\b/.test(t) && /\b(strike|bomb|attack|raid)\b/.test(t) && /\b(lebanon|beirut|hezbollah)\b/.test(t)) return 'Israel';
            if (/\b(us|u\.s\.|american|israel|idf)\b/.test(t) && /\b(strike|bomb|attack|hit)\b/.test(t)) return 'US/Israel';
            return 'Unknown';
        }

        function findLocation(text) {
            const t = text.toLowerCase();
            const sorted = Object.keys(LOCATION_DB).sort((a, b) => b.length - a.length);
            for (const loc of sorted) {

                    return { name: loc.charAt(0).toUpperCase() + loc.slice(1), coords: LOCATION_DB[loc] };
                }
            }
            return null;
        }

            return div.innerHTML;
        }

        // Render a single message
        const chatMessagesEl = document.getElementById('chat-messages');
        function renderMsg(msg) {
            const div = document.createElement('div');
            div.className = 'chat-msg';
            const isSelf = msg.username === chatUsername;
            const userSpan = document.createElement('span');
            userSpan.className = 'chat-msg-user' + (isSelf ? ' self' : '');
            userSpan.textContent = msg.username + ':';
            const textSpan = document.createElement('span');
            textSpan.className = 'chat-msg-text';
            textSpan.textContent = ' ' + msg.text;
            div.appendChild(userSpan);
            div.appendChild(textSpan);
            chatMessagesEl.appendChild(div);
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        }

        // Load recent messages
        async function loadChatHistory() {
            const { data, error } = await sb
                .from('messages')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(100);
            if (error) {
                console.warn('Chat load error:', error.message);
                const sys = document.createElement('div');
                sys.className = 'chat-system';
                sys.textContent = 'Could not load chat history';
                chatMessagesEl.appendChild(sys);
                return;
            }
            data.reverse().forEach(renderMsg);
        }

        // Subscribe to new messages
        sb.channel('messages-realtime')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                renderMsg(payload.new);
            })
            .subscribe();

        loadChatHistory();

        // Send handler + rate limit (client-side)
        let lastSendTime = 0;
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');
        const chatError = document.getElementById('chat-error');

        async function sendMessage() {
            const text = chatInput.value.trim();
            chatError.textContent = '';

            if (!text) return;
            if (text.length > 200) {
                chatError.textContent = 'Max 200 characters';
                return;
            }
            if (hasProfanity(text)) {
                chatError.textContent = 'Message blocked';
                return;
            }
            const now = Date.now();
            if (now - lastSendTime < 3000) {
                chatError.textContent = 'Slow down — 3 sec between messages';
                return;
            }

            chatSend.disabled = true;
            const { error } = await sb.from('messages').insert({ username: chatUsername, text });
            chatSend.disabled = false;

            if (error) {
                chatError.textContent = error.message.includes('Rate limit') ? 'Rate limited' : 'Send failed';
                return;
            }
            lastSendTime = now;
            chatInput.value = '';
        }

        chatSend.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
        });

        // Chat panel collapse/expand
        document.getElementById('chat-header').addEventListener('click', (e) => {
            if (e.target.id === 'chat-input' || e.target.id === 'chat-send') return;
            document.getElementById('chat-panel').classList.toggle('collapsed');
        });

        // On mobile, start collapsed
        if (window.innerWidth <= 768) {
            document.getElementById('chat-panel').classList.add('collapsed');
        }

    </script>
</body>
</html>
