name: Update Strike Data

on:
  schedule:
    # Every hour at :07 (off-peak, avoids round-minute API pile-ups)
    - cron: '7 * * * *'
  workflow_dispatch: # Manual trigger button in GitHub UI

# Only one run at a time — prevents commit conflicts
concurrency:
  group: update-strikes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        run: node scripts/update-data.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit & push changes
        run: |
          git config user.name "ww3-bot"
          git config user.email "bot@ww3-visualized.local"
          git add public/strikes.json public/totals.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update strike data [$(date -u +%Y-%m-%dT%H:%MZ)]"
            git push
          fi
